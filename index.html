
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction</title>
    <style>
        /* ───────────── RESET ───────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.5rem;
        }

        .card {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        /* ─── IMAGES (emojis as big icons) ─── */
        .construction-icons {
            font-size: 6rem;
            line-height: 1.2;
            margin-bottom: 1.2rem;
            letter-spacing: 0.2rem;
            animation: wobble 2.5s ease-in-out infinite;
        }

        @keyframes wobble {
            0%,
            100% {
                transform: rotate(-2deg) scale(1);
            }
            50% {
                transform: rotate(2deg) scale(1.04);
            }
        }

        /* ─── DIALOGUE BUBBLE ─── */
        .dialogue {
            background: #ffffff;
            padding: 2rem 2.5rem;
            border-radius: 60px 60px 60px 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: inline-block;
            position: relative;
            margin-top: 0.5rem;
        }

        /* tiny tail to make it look like a speech bubble */
        .dialogue::before {
            content: '';
            position: absolute;
            top: -18px;
            left: 40px;
            border: 10px solid transparent;
            border-bottom-color: #ffffff;
            border-top: 0;
            filter: drop-shadow(0 -4px 6px rgba(0, 0, 0, 0.02));
        }

        .dialogue h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .dialogue .sub {
            font-size: 1rem;
            font-weight: 400;
            color: #64748b;
            margin-top: 0.3rem;
            letter-spacing: 0.3px;
        }

        /* small broken detail */
        .broken-tag {
            display: inline-block;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.25rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .construction-icons {
                font-size: 4.2rem;
            }
            .dialogue {
                padding: 1.5rem 1.8rem;
                border-radius: 40px 40px 40px 10px;
            }
            .dialogue h2 {
                font-size: 1.6rem;
            }
            .dialogue .sub {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Construction & Broken icons -->
        <div class="construction-icons">
            🚧&nbsp;💥&nbsp;🔧
        </div>

        <!-- Dialogue bubble: "Contact Admin" -->
        <div class="dialogue">
            <h2>📞 Contact Admin</h2>
            <div class="sub">We're working on it — reach out if you need us.</div>
        </div>

        <!-- subtle broken indicator -->
        <div class="broken-tag">⚠️ something broke</div>

    </div>

</body>
</html>
